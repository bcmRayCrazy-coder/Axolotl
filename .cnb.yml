main:
  'crontab: */15 * * * *':
    - name: Sync source from GitHub
      stages:
        - name: Pull GitHub repository
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/Mystic-Stars/Axolotl.git
            auth_type: https
            branch: main
            sync_mode: pull
            force: true
            push_tags: true
            fetch_options: --prune

'v*':
  tag_push:
    - name: Mirror GitHub release
      runner:
        tags: cnb:arch:amd64
        cpus: 2
      docker:
        image: node:24-bookworm
      stages:
        - name: Wait for and publish GitHub release
          script: |
            set -eu
            apt-get update
            apt-get install -y --no-install-recommends git
            node scripts/axolotl/cnb-release.mjs finalize "$CNB_BRANCH" cnb-release/final
            node scripts/axolotl/verify-update-manifest.mjs cnb-release/final/latest.json "$CNB_BRANCH" cnb

'mirror-v*':
  tag_push:
    - name: Mirror existing GitHub release
      runner:
        tags: cnb:arch:amd64
        cpus: 2
      docker:
        image: node:24-bookworm
      stages:
        - name: Mirror requested GitHub release
          script: |
            set -eu
            release_tag="${CNB_BRANCH#mirror-}"
            apt-get update
            apt-get install -y --no-install-recommends git
            node scripts/axolotl/cnb-release.mjs finalize "$release_tag" cnb-release/final
            node scripts/axolotl/verify-update-manifest.mjs cnb-release/final/latest.json "$release_tag" cnb
